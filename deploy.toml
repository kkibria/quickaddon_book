[deploy.audit]
# Start conservative; expand when needed.
allow_exts = [".html", ".css", ".js", ".json", ".svg", ".png", ".jpg", ".woff2", ".woff", ".ttf", ".map"]
allow_dotfiles = [".nojekyll"]

# Always deny these, even if allow rules would otherwise include them
blacklist_basenames = [".DS_Store", "Thumbs.db"]

# Optional: allow whole subtrees
allow_globs = ["css/**", "fonts/**", "files/**", "topics/**"]

# Optional: deny patterns if you ever need them
deny_globs = []